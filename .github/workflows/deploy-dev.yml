name: Deploy Auth Development

permissions:
  contents: read

on:
  push:
    branches: [development]
    paths:
      - 'server/**'
      - 'client/**'
      - 'index.html'
      - 'package*.json'
      - 'dark-avian-labs.dev.config.cjs'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'favicon.ico'
      - 'feathers.png'
      - 'background.txt'
      - '.env.development'
      - '.github/workflows/deploy-dev.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
      SERVER_KNOWN_HOST: ${{ secrets.SERVER_KNOWN_HOST_DEV }}
      SERVER_STACK_PATH: ${{ secrets.SERVER_STACK_PATH_DEV }}
      SERVER_PATH: ${{ secrets.SERVER_PATH_DEV }}
      SERVER_USER: ${{ secrets.SERVER_USER_DEV }}
      SERVER_HOST: ${{ secrets.SERVER_HOST_DEV }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT_DEV }}
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          if [ -z "$DOTENV_PRIVATE_KEY_DEVELOPMENT" ]; then
            echo "ERROR: DOTENV_PRIVATE_KEY_DEVELOPMENT secret is missing or empty."
            exit 1
          fi
          npx dotenvx run --strict -f .env.development -- npm run build

      - name: List built files (debug)
        run: |
          ls -la dist/
          if [ -d dist/static ]; then ls -la dist/static/; fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -z "$SERVER_KNOWN_HOST" ]; then
            echo "ERROR: SERVER_KNOWN_HOST_DEV secret is missing or empty."
            exit 1
          fi
          if [ -z "$SERVER_SSH_PORT" ]; then
            echo "ERROR: SERVER_SSH_PORT_DEV secret is missing or empty."
            exit 1
          fi
          echo "$SERVER_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment
        run: |
          mkdir -p /tmp/deploy
          cp -r dist/ /tmp/deploy/
          cp package*.json /tmp/deploy/
          if [ -f .env.development ]; then cp .env.development /tmp/deploy/; fi
          if [ -f favicon.ico ]; then cp favicon.ico /tmp/deploy/; fi
          if [ -f feathers.png ]; then cp feathers.png /tmp/deploy/; fi
          if [ -f background.txt ]; then cp background.txt /tmp/deploy/; fi
          cd /tmp/deploy && npm ci --omit=dev

      - name: Deploy to server
        run: |
          STACK_PATH="$SERVER_STACK_PATH"
          if [ -z "$STACK_PATH" ]; then
            STACK_PATH="$(dirname "$SERVER_PATH")"
          fi

          rsync -avp --delete \
          --exclude='.env' \
          --exclude='.env.local' \
          --exclude='logs/' \
          --exclude='data/' \
          -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
          /tmp/deploy/ \
          $SERVER_USER@$SERVER_HOST:$SERVER_PATH/

          rsync -av \
          -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
          dark-avian-labs.dev.config.cjs \
          $SERVER_USER@$SERVER_HOST:${STACK_PATH}/

          DOTENV_KEY_B64=$(printf '%s' "$DOTENV_PRIVATE_KEY_DEVELOPMENT" | base64 | tr -d '\n')
          ssh -p "$SERVER_SSH_PORT" -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SERVER_USER@$SERVER_HOST" \
            "cd \"$SERVER_PATH\" && printf 'DOTENV_PRIVATE_KEY_DEVELOPMENT=%s\n' \"\$(printf '%s' '$DOTENV_KEY_B64' | base64 -d)\" > .env.keys && chmod 600 .env.keys && test -s .env.keys || { echo 'ERROR: Failed to create or configure .env.keys on server'; exit 1; }"

      - name: Restart PM2
        run: |
          ssh -p "$SERVER_SSH_PORT" -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            $SERVER_USER@$SERVER_HOST \
            "cd $SERVER_PATH && source ~/.nvm/nvm.sh && pm2 restart '[DEV] Auth' --update-env"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
