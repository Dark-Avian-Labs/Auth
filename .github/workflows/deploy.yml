name: Deploy Auth

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'dark-avian-labs.config.cjs'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'favicon.ico'
      - 'feathers.png'
      - 'background.txt'
      - '.env.production'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_KNOWN_HOST: ${{ secrets.SERVER_KNOWN_HOST }}
      SERVER_STACK_PATH: ${{ secrets.SERVER_STACK_PATH }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run OxLint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Build project
        run: |
          if [ -z "$DOTENV_PRIVATE_KEY_PRODUCTION" ]; then
            echo "ERROR: DOTENV_PRIVATE_KEY_PRODUCTION secret is missing or empty."
            exit 1
          fi
          pnpm exec dotenvx run --strict -f .env.production -- pnpm run build

      - name: List built files (debug)
        run: |
          ls -la dist/
          if [ -d dist/static ]; then ls -la dist/static/; fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -z "$SERVER_KNOWN_HOST" ]; then
            echo "ERROR: SERVER_KNOWN_HOST secret is missing or empty."
            exit 1
          fi
          if [ -z "$SERVER_SSH_PORT" ]; then
            echo "ERROR: SERVER_SSH_PORT secret is missing or empty."
            exit 1
          fi
          echo "$SERVER_KNOWN_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment
        run: |
          mkdir -p /tmp/deploy
          cp -r dist/ /tmp/deploy/
          cp package.json pnpm-lock.yaml /tmp/deploy/
          if [ -f .env.production ]; then cp .env.production /tmp/deploy/; fi
          if [ -f favicon.ico ]; then cp favicon.ico /tmp/deploy/; fi
          if [ -f feathers.png ]; then cp feathers.png /tmp/deploy/; fi
          if [ -f background.txt ]; then cp background.txt /tmp/deploy/; fi
          cd /tmp/deploy && pnpm install --frozen-lockfile --prod

      - name: Deploy to server
        run: |
          STACK_PATH="$SERVER_STACK_PATH"
          if [ -z "$STACK_PATH" ]; then
            STACK_PATH="$(dirname "$SERVER_PATH")"
          fi

          rsync -avp --delete \
          --exclude='.env' \
          --exclude='.env.local' \
          --exclude='logs/' \
          --exclude='data/' \
          -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
          /tmp/deploy/ \
          $SERVER_USER@$SERVER_HOST:$SERVER_PATH/

          rsync -av \
          -e "ssh -p $SERVER_SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
          dark-avian-labs.config.cjs \
          $SERVER_USER@$SERVER_HOST:${STACK_PATH}/

          DOTENV_KEY_B64=$(printf '%s' "$DOTENV_PRIVATE_KEY_PRODUCTION" | base64 | tr -d '\n')
          ssh -p "$SERVER_SSH_PORT" -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SERVER_USER@$SERVER_HOST" \
            "cd \"$SERVER_PATH\" && printf 'DOTENV_PRIVATE_KEY_PRODUCTION=%s\n' \"\$(printf '%s' '$DOTENV_KEY_B64' | base64 -d)\" > .env.keys && chmod 600 .env.keys && test -s .env.keys || { echo 'ERROR: Failed to create or configure .env.keys on server'; exit 1; }"

      - name: Restart PM2
        run: |
          ssh -p "$SERVER_SSH_PORT" -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            $SERVER_USER@$SERVER_HOST \
            "cd $SERVER_PATH && source ~/.nvm/nvm.sh && pm2 restart 'Auth' --update-env"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
